<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxNAS - Real-Time Monitoring</title>
    
    <!-- Chart.js for real-time charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    
    <!-- Modern CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .metric-card {
            transition: all 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .status-online {
            color: #10b981;
        }
        
        .status-offline {
            color: #ef4444;
        }
        
        .status-warning {
            color: #f59e0b;
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Header -->
    <header class="glass-effect p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-server text-white text-2xl"></i>
                <h1 class="text-white text-2xl font-bold">MoxNAS Real-Time Monitor</h1>
            </div>
            
            <div class="flex items-center space-x-4">
                <!-- Connection Status -->
                <div id="connection-status" class="flex items-center space-x-2">
                    <div id="status-indicator" class="w-3 h-3 rounded-full bg-gray-400"></div>
                    <span id="status-text" class="text-white text-sm">Connecting...</span>
                </div>
                
                <!-- Monitoring Controls -->
                <button id="start-monitoring" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fas fa-play mr-2"></i>Start
                </button>
                <button id="stop-monitoring" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fas fa-stop mr-2"></i>Stop
                </button>
                
                <!-- Auto-refresh Toggle -->
                <label class="flex items-center space-x-2 text-white">
                    <input type="checkbox" id="auto-refresh" checked class="rounded">
                    <span class="text-sm">Auto-refresh</span>
                </label>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4">
        <!-- System Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- System CPU Card -->
            <div class="metric-card glass-effect rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-microchip text-blue-400 text-2xl"></i>
                        <h3 class="text-white font-semibold">CPU Usage</h3>
                    </div>
                    <div id="cpu-loading" class="loading-spinner"></div>
                </div>
                <div class="text-3xl font-bold text-white mb-2" id="cpu-usage">--</div>
                <div class="text-sm text-gray-300" id="cpu-load">Load Average: --</div>
            </div>

            <!-- System Memory Card -->
            <div class="metric-card glass-effect rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-memory text-green-400 text-2xl"></i>
                        <h3 class="text-white font-semibold">Memory</h3>
                    </div>
                    <div id="memory-loading" class="loading-spinner hidden"></div>
                </div>
                <div class="text-3xl font-bold text-white mb-2" id="memory-usage">--</div>
                <div class="text-sm text-gray-300" id="memory-details">-- / -- GB</div>
            </div>

            <!-- Storage Card -->
            <div class="metric-card glass-effect rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-hdd text-purple-400 text-2xl"></i>
                        <h3 class="text-white font-semibold">Storage</h3>
                    </div>
                    <div id="storage-loading" class="loading-spinner hidden"></div>
                </div>
                <div class="text-3xl font-bold text-white mb-2" id="storage-usage">--</div>
                <div class="text-sm text-gray-300" id="storage-details">-- / -- GB</div>
            </div>

            <!-- Network Card -->
            <div class="metric-card glass-effect rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-network-wired text-yellow-400 text-2xl"></i>
                        <h3 class="text-white font-semibold">Network</h3>
                    </div>
                    <div id="network-loading" class="loading-spinner hidden"></div>
                </div>
                <div class="text-lg font-bold text-white mb-1" id="network-in">↓ --</div>
                <div class="text-lg font-bold text-white" id="network-out">↑ --</div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- CPU Usage Chart -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-white font-semibold mb-4 flex items-center">
                    <i class="fas fa-chart-line mr-2"></i>
                    CPU Usage History
                </h3>
                <div class="chart-container">
                    <canvas id="cpu-chart"></canvas>
                </div>
            </div>

            <!-- Memory Usage Chart -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-white font-semibold mb-4 flex items-center">
                    <i class="fas fa-chart-area mr-2"></i>
                    Memory Usage History
                </h3>
                <div class="chart-container">
                    <canvas id="memory-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Proxmox Nodes Section -->
        <div class="glass-effect rounded-xl p-6 mb-8">
            <h3 class="text-white font-semibold mb-4 flex items-center">
                <i class="fas fa-server mr-2"></i>
                Proxmox Nodes
            </h3>
            <div id="nodes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Nodes will be populated here -->
            </div>
        </div>

        <!-- Containers Section -->
        <div class="glass-effect rounded-xl p-6 mb-8">
            <h3 class="text-white font-semibold mb-4 flex items-center">
                <i class="fas fa-cube mr-2"></i>
                Containers
            </h3>
            <div id="containers-container">
                <!-- Containers table will be populated here -->
            </div>
        </div>
    </div>

    <script>
        class RealTimeMonitor {
            constructor() {
                this.isMonitoring = false;
                this.autoRefresh = true;
                this.refreshInterval = null;
                this.charts = {};
                this.dataPoints = {
                    cpu: [],
                    memory: []
                };
                this.maxDataPoints = 20;
                
                this.initializeCharts();
                this.bindEvents();
                this.checkMonitoringStatus();
                this.startDataRefresh();
            }

            initializeCharts() {
                // CPU Chart
                const cpuCtx = document.getElementById('cpu-chart').getContext('2d');
                this.charts.cpu = new Chart(cpuCtx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'CPU Usage (%)',
                            data: [],
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: 'white'
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: 'white' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            y: {
                                ticks: { color: 'white' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                min: 0,
                                max: 100
                            }
                        }
                    }
                });

                // Memory Chart
                const memoryCtx = document.getElementById('memory-chart').getContext('2d');
                this.charts.memory = new Chart(memoryCtx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Memory Usage (%)',
                            data: [],
                            borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: 'white'
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: 'white' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            y: {
                                ticks: { color: 'white' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                min: 0,
                                max: 100
                            }
                        }
                    }
                });
            }

            bindEvents() {
                document.getElementById('start-monitoring').addEventListener('click', () => {
                    this.startMonitoring();
                });

                document.getElementById('stop-monitoring').addEventListener('click', () => {
                    this.stopMonitoring();
                });

                document.getElementById('auto-refresh').addEventListener('change', (e) => {
                    this.autoRefresh = e.target.checked;
                    if (this.autoRefresh) {
                        this.startDataRefresh();
                    } else {
                        this.stopDataRefresh();
                    }
                });
            }

            async startMonitoring() {
                try {
                    const response = await fetch('/proxmox_integration/api/monitoring/start/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        this.updateConnectionStatus('online', 'Monitoring Active');
                        this.isMonitoring = true;
                    }
                } catch (error) {
                    console.error('Failed to start monitoring:', error);
                    this.updateConnectionStatus('error', 'Failed to start monitoring');
                }
            }

            async stopMonitoring() {
                try {
                    const response = await fetch('/proxmox_integration/api/monitoring/stop/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        this.updateConnectionStatus('offline', 'Monitoring Stopped');
                        this.isMonitoring = false;
                    }
                } catch (error) {
                    console.error('Failed to stop monitoring:', error);
                }
            }

            async checkMonitoringStatus() {
                try {
                    const response = await fetch('/proxmox_integration/api/monitoring/status/');
                    const data = await response.json();
                    
                    if (data.success) {
                        this.isMonitoring = data.monitoring_active;
                        this.updateConnectionStatus(
                            this.isMonitoring ? 'online' : 'offline',
                            this.isMonitoring ? 'Monitoring Active' : 'Monitoring Stopped'
                        );
                    }
                } catch (error) {
                    console.error('Failed to check monitoring status:', error);
                    this.updateConnectionStatus('error', 'Connection Error');
                }
            }

            async fetchDashboardData() {
                try {
                    const response = await fetch('/proxmox_integration/api/realtime/dashboard/');
                    const result = await response.json();
                    
                    if (result.success && result.data) {
                        this.updateSystemMetrics(result.data.system);
                        this.updateNodes(result.data.nodes);
                        this.updateConnectionStatus('online', 'Connected');
                    } else {
                        this.updateConnectionStatus('warning', 'No Data');
                    }
                } catch (error) {
                    console.error('Failed to fetch dashboard data:', error);
                    this.updateConnectionStatus('error', 'Connection Error');
                }
            }

            updateSystemMetrics(systemData) {
                if (!systemData) return;

                // Update CPU
                const cpuUsage = systemData.cpu_usage || 0;
                document.getElementById('cpu-usage').textContent = `${cpuUsage.toFixed(1)}%`;
                document.getElementById('cpu-load').textContent = 
                    `Load Average: ${systemData.load_average ? systemData.load_average.map(l => l.toFixed(2)).join(', ') : '--'}`;

                // Update Memory
                const memoryUsage = systemData.memory_usage || 0;
                const memoryTotal = systemData.memory_total || 0;
                const memoryAvailable = systemData.memory_available || 0;
                document.getElementById('memory-usage').textContent = `${memoryUsage.toFixed(1)}%`;
                document.getElementById('memory-details').textContent = 
                    `${this.formatBytes(memoryTotal - memoryAvailable)} / ${this.formatBytes(memoryTotal)}`;

                // Update Storage
                const diskUsage = systemData.disk_usage || 0;
                const diskTotal = systemData.disk_total || 0;
                const diskFree = systemData.disk_free || 0;
                document.getElementById('storage-usage').textContent = `${diskUsage.toFixed(1)}%`;
                document.getElementById('storage-details').textContent = 
                    `${this.formatBytes(diskTotal - diskFree)} / ${this.formatBytes(diskTotal)}`;

                // Update Network
                document.getElementById('network-in').textContent = 
                    `↓ ${this.formatBytes(systemData.network_io_recv || 0)}/s`;
                document.getElementById('network-out').textContent = 
                    `↑ ${this.formatBytes(systemData.network_io_sent || 0)}/s`;

                // Update charts
                this.updateChartData(cpuUsage, memoryUsage);
            }

            updateChartData(cpuUsage, memoryUsage) {
                const now = new Date().toLocaleTimeString();

                // Update CPU chart
                if (this.charts.cpu.data.labels.length >= this.maxDataPoints) {
                    this.charts.cpu.data.labels.shift();
                    this.charts.cpu.data.datasets[0].data.shift();
                }
                this.charts.cpu.data.labels.push(now);
                this.charts.cpu.data.datasets[0].data.push(cpuUsage);
                this.charts.cpu.update('none');

                // Update Memory chart
                if (this.charts.memory.data.labels.length >= this.maxDataPoints) {
                    this.charts.memory.data.labels.shift();
                    this.charts.memory.data.datasets[0].data.shift();
                }
                this.charts.memory.data.labels.push(now);
                this.charts.memory.data.datasets[0].data.push(memoryUsage);
                this.charts.memory.update('none');
            }

            updateNodes(nodesData) {
                const container = document.getElementById('nodes-container');
                if (!nodesData || !Array.isArray(nodesData)) {
                    container.innerHTML = '<p class="text-gray-300">No node data available</p>';
                    return;
                }

                container.innerHTML = nodesData.map(node => `
                    <div class="bg-white bg-opacity-10 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="text-white font-semibold">${node.node_name}</h4>
                            <span class="text-sm ${this.getStatusClass(node.status)}">
                                <i class="fas fa-circle mr-1"></i>${node.status}
                            </span>
                        </div>
                        <div class="text-sm text-gray-300 space-y-1">
                            <div>CPU: ${node.cpu_usage ? node.cpu_usage.toFixed(1) : '--'}%</div>
                            <div>Memory: ${this.formatBytes(node.memory_usage || 0)} / ${this.formatBytes(node.memory_total || 0)}</div>
                            <div>Storage: ${this.formatBytes(node.storage_usage || 0)} / ${this.formatBytes(node.storage_total || 0)}</div>
                            <div>Containers: ${node.containers ? node.containers.length : 0}</div>
                        </div>
                    </div>
                `).join('');
            }

            updateConnectionStatus(status, text) {
                const indicator = document.getElementById('status-indicator');
                const statusText = document.getElementById('status-text');

                indicator.className = `w-3 h-3 rounded-full ${this.getStatusIndicatorClass(status)}`;
                statusText.textContent = text;

                if (status === 'online') {
                    indicator.classList.add('pulse-animation');
                } else {
                    indicator.classList.remove('pulse-animation');
                }
            }

            getStatusClass(status) {
                switch (status?.toLowerCase()) {
                    case 'online':
                    case 'running':
                        return 'status-online';
                    case 'offline':
                    case 'stopped':
                        return 'status-offline';
                    default:
                        return 'status-warning';
                }
            }

            getStatusIndicatorClass(status) {
                switch (status) {
                    case 'online':
                        return 'bg-green-400';
                    case 'offline':
                        return 'bg-red-400';
                    case 'warning':
                        return 'bg-yellow-400';
                    case 'error':
                        return 'bg-red-500';
                    default:
                        return 'bg-gray-400';
                }
            }

            formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            startDataRefresh() {
                if (this.refreshInterval) return;
                
                this.refreshInterval = setInterval(() => {
                    if (this.autoRefresh) {
                        this.fetchDashboardData();
                    }
                }, 5000); // Refresh every 5 seconds

                // Initial fetch
                this.fetchDashboardData();
            }

            stopDataRefresh() {
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }
            }
        }

        // Initialize the monitor when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new RealTimeMonitor();
        });
    </script>
</body>
</html>
