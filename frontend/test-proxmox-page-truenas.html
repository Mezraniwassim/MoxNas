<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox Integration - MoxNAS</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-blue: #0095d5;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            --info-color: #0095d5;
            --truenas-gradient: linear-gradient(135deg, #0095d5, #0070a0);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--truenas-gradient);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(0, 149, 213, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(0, 149, 213, 0.1);
        }

        .card h3 {
            color: var(--accent-blue);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
        }

        .status-card {
            position: relative;
            overflow: hidden;
        }

        .status-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--info-color);
        }

        .status-card.success::after {
            background: var(--success-color);
        }

        .status-card.error::after {
            background: var(--error-color);
        }

        .status-card.info::after {
            background: var(--info-color);
        }

        #test-status {
            font-size: 1.1rem;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 8px;
            background-color: var(--secondary-bg);
            color: var(--text-secondary);
        }

        .test-list {
            list-style: none;
            padding: 0;
        }

        .test-list li {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .test-list li:hover {
            background-color: var(--secondary-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 149, 213, 0.1);
        }

        .test-name {
            font-weight: 600;
            color: var(--text-primary);
            flex-grow: 1;
        }

        .test-result {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .test-result.pass {
            color: var(--success-color);
        }

        .test-result.fail {
            color: var(--error-color);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .proxmox-container {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--success-color);
        }

        .badge.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }

        .truenas-button {
            background: var(--truenas-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .truenas-button:hover {
            box-shadow: 0 4px 12px rgba(0, 149, 213, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ Proxmox Integration Test Suite</h1>
        </div>
        
        <div class="card status-card info">
            <h3>📊 Test Execution Status</h3>
            <div id="test-status">
                <span class="loading-spinner"></span>
                Initializing test suite...
            </div>
        </div>

        <div class="card">
            <h3>🔌 API Connectivity Tests</h3>
            <ul id="api-tests" class="test-list">
                <li>
                    <div class="test-name">System Initialization</div>
                    <div class="test-result">Preparing test environment...</div>
                </li>
            </ul>
        </div>

        <div class="card">
            <h3>⚡ Proxmox Manager Integration</h3>
            <div id="proxmox-manager-container" class="proxmox-container">
                <div>
                    <span class="loading-spinner"></span>
                    Awaiting Proxmox Manager initialization...
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/proxmox-simple.js"></script>
    <script>
        let testResults = [];
        
        function updateTestStatus(message, type = 'info') {
            const status = document.getElementById('test-status');
            status.innerHTML = message;
            const statusCard = status.closest('.status-card');
            statusCard.className = `card status-card ${type}`;
        }
        
        function addTestResult(test, result, details = '') {
            testResults.push({ test, result, details });
            updateTestList();
        }
        
        function updateTestList() {
            const list = document.getElementById('api-tests');
            list.innerHTML = '';
            testResults.forEach(test => {
                const li = document.createElement('li');
                li.className = test.result ? 'success' : 'error';
                
                const resultText = test.result ? 'PASS' : 'FAIL';
                const badge = `<span class="badge ${test.result ? 'success' : 'error'}">${resultText}</span>`;
                
                li.innerHTML = `
                    <div class="test-name">${test.test}${badge}</div>
                    <div class="test-result ${test.result ? 'pass' : 'fail'}">${test.details}</div>
                `;
                list.appendChild(li);
            });
        }
        
        async function runTests() {
            updateTestStatus('<span class="loading-spinner"></span>Executing API connectivity tests...', 'info');
            
            // Test 1: Check if ProxmoxManager class is available
            addTestResult('ProxmoxManager Class', typeof ProxmoxManager === 'function', 
                typeof ProxmoxManager === 'function' ? 'Class loaded successfully' : 'Class not found');
            
            // Test 2: Test config API
            try {
                const response = await fetch('http://localhost:8000/api/proxmox/api/config/');
                const data = await response.json();
                addTestResult('Config API', response.ok && data.success, 
                    `Response: ${response.status}, Success: ${data.success}`);
            } catch (error) {
                addTestResult('Config API', false, `Error: ${error.message}`);
            }
            
            // Test 3: Test nodes API
            try {
                const response = await fetch('http://localhost:8000/api/proxmox/api/nodes/');
                const data = await response.json();
                addTestResult('Nodes API', response.ok && Array.isArray(data), 
                    `Response: ${response.status}, Nodes: ${Array.isArray(data) ? data.length : 'invalid'}`);
            } catch (error) {
                addTestResult('Nodes API', false, `Error: ${error.message}`);
            }
            
            // Test 4: Test containers API
            try {
                const response = await fetch('http://localhost:8000/api/proxmox/api/containers/');
                const data = await response.json();
                addTestResult('Containers API', response.ok && Array.isArray(data), 
                    `Response: ${response.status}, Containers: ${Array.isArray(data) ? data.length : 'invalid'}`);
            } catch (error) {
                addTestResult('Containers API', false, `Error: ${error.message}`);
            }
            
            // Test 5: Initialize ProxmoxManager
            try {
                updateTestStatus('<span class="loading-spinner"></span>Initializing Proxmox Manager component...', 'info');
                const manager = new ProxmoxManager();
                addTestResult('ProxmoxManager Initialization', true, 'Manager instance created successfully');
                window.testProxmoxManager = manager;
                
                // Update container
                const container = document.getElementById('proxmox-manager-container');
                container.innerHTML = '<div style="color: var(--success-color); font-weight: 600;">✅ Proxmox Manager loaded successfully!</div>';
                
                updateTestStatus('✅ Test suite completed successfully! All systems operational.', 'success');
            } catch (error) {
                addTestResult('ProxmoxManager Initialization', false, `Error: ${error.message}`);
                updateTestStatus('❌ Test suite failed! Check individual test results for details.', 'error');
                
                const container = document.getElementById('proxmox-manager-container');
                container.innerHTML = `<div style="color: var(--error-color); font-weight: 600;">❌ Failed to load Proxmox Manager: ${error.message}</div>`;
            }
        }
        
        // Start tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
