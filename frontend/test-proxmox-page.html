<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox Page Test - MoxNAS</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <style>
        body { margin: 20px; font-family: Arial, sans-serif; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
    </style>
</head>
<body>
    <h1>🖥️ Proxmox Page Test</h1>
    
    <div class="test-section info">
        <h3>Test Status</h3>
        <p id="test-status">Starting tests...</p>
    </div>

    <div class="test-section">
        <h3>API Connectivity Tests</h3>
        <ul id="api-tests">
            <li>Testing...</li>
        </ul>
    </div>

    <!-- Proxmox Manager Container -->
    <div id="proxmox-manager-container">
        <h3>Proxmox Manager Loading...</h3>
    </div>

    <script src="src/js/proxmox-simple.js"></script>
    <script>
        let testResults = [];
        
        function updateTestStatus(message, type = 'info') {
            const status = document.getElementById('test-status');
            status.textContent = message;
            status.className = type;
        }
        
        function addTestResult(test, result, details = '') {
            testResults.push({ test, result, details });
            updateTestList();
        }
        
        function updateTestList() {
            const list = document.getElementById('api-tests');
            list.innerHTML = '';
            testResults.forEach(test => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${test.test}:</strong> ${test.result ? '✅ PASS' : '❌ FAIL'} ${test.details}`;
                li.className = test.result ? 'success' : 'error';
                list.appendChild(li);
            });
        }
        
        async function runTests() {
            updateTestStatus('Running API tests...', 'info');
            
            // Test 1: Check if ProxmoxManager class is available
            addTestResult('ProxmoxManager Class', typeof ProxmoxManager === 'function', 
                typeof ProxmoxManager === 'function' ? '- Class loaded successfully' : '- Class not found');
            
            // Test 2: Test config API
            try {
                const response = await fetch('http://localhost:8000/api/proxmox/api/config/');
                const data = await response.json();
                addTestResult('Config API', response.ok && data.success, 
                    `- Response: ${response.status}, Success: ${data.success}`);
            } catch (error) {
                addTestResult('Config API', false, `- Error: ${error.message}`);
            }
            
            // Test 3: Test nodes API
            try {
                const response = await fetch('http://localhost:8000/api/proxmox/api/nodes/');
                const data = await response.json();
                addTestResult('Nodes API', response.ok && Array.isArray(data), 
                    `- Response: ${response.status}, Nodes: ${Array.isArray(data) ? data.length : 'invalid'}`);
            } catch (error) {
                addTestResult('Nodes API', false, `- Error: ${error.message}`);
            }
            
            // Test 4: Test containers API
            try {
                const response = await fetch('http://localhost:8000/api/proxmox/api/containers/');
                const data = await response.json();
                addTestResult('Containers API', response.ok && Array.isArray(data), 
                    `- Response: ${response.status}, Containers: ${Array.isArray(data) ? data.length : 'invalid'}`);
            } catch (error) {
                addTestResult('Containers API', false, `- Error: ${error.message}`);
            }
            
            // Test 5: Initialize ProxmoxManager
            try {
                updateTestStatus('Initializing ProxmoxManager...', 'info');
                const manager = new ProxmoxManager();
                addTestResult('ProxmoxManager Init', true, '- Manager created successfully');
                window.testProxmoxManager = manager;
                
                updateTestStatus('✅ All tests completed! ProxmoxManager should be loaded below.', 'success');
            } catch (error) {
                addTestResult('ProxmoxManager Init', false, `- Error: ${error.message}`);
                updateTestStatus('❌ ProxmoxManager initialization failed!', 'error');
            }
        }
        
        // Start tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
